name: Release

# Forgejo is the authoritative CI. Semantic-release lives here — not on the GitHub
# mirror — so the version tag is created from Conventional Commits on main. GitHub
# receives the push mirror, reacts to the `v*` tag, and builds + publishes the
# (unsigned) Apple Silicon application. The ToskVoice test suite requires the macOS 26
# SDK, which the Forgejo runners do not provide, so no tests run in this pipeline.
#
# Do NOT add `[skip ci]` (or `[ci skip]`, `[no ci]`, `[skip actions]`) to the
# semantic-release commit message (.releaserc.json). The `v*` tag points at that
# commit, and GitHub honours skip-ci markers on the commit a tag references, so the
# mirrored tag build would be silently skipped and no GitHub release would publish.
# The release commit re-triggers this job once, but semantic-release derives the next
# version from the last git tag, finds no commits since the fresh tag, and exits — a
# harmless no-op. That tag-based check is the loop guard; keep it.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    if: forgejo.ref == 'refs/heads/main' && forgejo.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
