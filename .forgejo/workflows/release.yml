name: Release

# Forgejo is the authoritative CI. Semantic-release lives here — not on the GitHub
# mirror — so the version tag is created from Conventional Commits on main. GitHub
# receives the push mirror, reacts to the `v*` tag, and builds + publishes the
# (unsigned) Apple Silicon application. The ToskVoice test suite requires the macOS 26
# SDK, which the Forgejo runners do not provide, so no tests run in this pipeline.
#
# The `v*` tag points at the semantic-release commit, and GitHub honours skip-ci
# markers ([skip ci], [ci skip], [no ci], [skip actions]) on the commit a tag
# references — such a marker would silently skip the mirrored tag build so no GitHub
# release publishes. Two rules keep that from happening, both in .releaserc.json:
#   1. The commit message must NOT contain a skip-ci marker.
#   2. The commit message is subject-only ("chore(release): vX.Y.Z") with NO notes
#      body. The notes list prior commit subjects, and any of those may itself contain
#      a literal skip-ci marker, which would leak into the tagged commit's message.
# The notes still reach CHANGELOG.md and the GitHub release; only the commit body drops
# them. Loop prevention does not rely on skip-ci: semantic-release derives the next
# version from the last git tag, so the release commit re-triggers this job once and
# exits with no commits since the fresh tag — a harmless no-op.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    if: forgejo.ref == 'refs/heads/main' && forgejo.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
